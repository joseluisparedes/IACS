<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="neon-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b180ff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
  </defs>
  <!-- Main shape: Technological Shield / Hexagon -->
  <polygon points="16,3 28,10 28,24 16,31 4,24 4,10" fill="#0f172a" stroke="url(#neon-blue)" stroke-width="2.5" stroke-linejoin="round" />
  
  <!-- Nested inner tech lines -->
  <path d="M16,8 L24,12 L24,20 L16,24 L8,20 L8,12 Z" fill="none" stroke="url(#neon-purple)" stroke-width="1.5" opacity="0.7" />
  
  <!-- Central glowing node connection -->
  <circle cx="16" cy="16" r="3.5" fill="url(#neon-blue)" />
  <line x1="16" y1="16" x2="16" y2="9" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="16" x2="10" y2="19.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="16" x2="22" y2="19.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
</svg>
